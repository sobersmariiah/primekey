name: primekey_loan_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web: ^1.0.0
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  file_picker: ^8.0.7
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5
  photo_view: ^0.15.0
  image_picker: ^1.0.7
  pdfx: ^2.5.0
  url_launcher: ^6.2.5
  path_provider: ^2.1.2
  http: ^1.2.0
  visibility_detector: ^0.4.0
  flutter_animate: ^4.5.2

  flutter_web_plugins:
    sdk: flutter
  simple_file_saver: ^2.0.1
  flutter_secure_storage: ^9.2.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/primekey-logo.png"

flutter:
  uses-material-design: true

  assets:

    - assets/images/primekey-logo.png
    - assets/images/computer.png
    - assets/images/step_1.png
    - assets/images/step_2.png
    - assets/images/step_3.png
 
